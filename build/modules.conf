# modules.conf — minimal module build list for the Bella Novella appliance.
#
# Copy this over /usr/local/src/freeswitch/modules.conf before building so that
# `make` compiles ONLY the modules this appliance loads at runtime
# (see conf/autoload_configs/modules.conf.xml). Anything not listed here is not
# built, which keeps the build fast and the install tree small.
#
# Paths are relative to src/mod/ in the FreeSWITCH source tree.

## Loggers
loggers/mod_console
loggers/mod_logfile

## Timers (high-resolution timing sources used by the media engine)
timers/mod_timerfd
timers/mod_posix_timer

## Event handlers (local ESL / fs_cli on 127.0.0.1)
event_handlers/mod_event_socket

## Endpoints (SIP)
endpoints/mod_sofia

## Dialplan engine
dialplans/mod_dialplan_xml

## Applications
applications/mod_commands
applications/mod_dptools

## Formats / media playback
formats/mod_native_file
formats/mod_sndfile
formats/mod_tone_stream

## Say (spoken number/date support)
say/mod_say_en
